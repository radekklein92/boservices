name: CI

# Povinný check pro merge do main (vedle Vercelu): TypeScript typecheck.
# "Zelená" pak znamená víc než "zkompilovalo se" - i typová správnost.
# Lint záměrně není (repo nemá ESLint config; type-safety navíc hlídá i Vercel
# build, protože next.config.ts nemá ignoreBuildErrors).

on:
  pull_request:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # V repu jsou oba lockfily; npm ci preferuje package-lock.json (plnější),
      # fallback npm install ať check nikdy nespadne jen na instalaci.
      - run: npm ci || npm install --no-audit --no-fund
      - run: npm run typecheck
