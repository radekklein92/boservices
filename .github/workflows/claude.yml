name: Claude Code

# Spouští se na issues/komentáře s labelem "claude-task" (přidává jen Portál přes
# /portal/admin/changes = governance gate; ručně mimo Portál Claude nikdo
# nespustí). Claude udělá změny v PR a TENTÝŽ běh zapne auto-merge (--auto
# --squash) - obchází GitHub anti-rekurzi (PR otevřený přes GITHUB_TOKEN by jinak
# samostatný auto-merge.yml nespustil). Po zelených checcích (Vercel + typecheck)
# GitHub PR zmerguje a Vercel nasadí do produkce.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  claude:
    if: >-
      contains(github.event.issue.labels.*.name, 'claude-task') &&
      (github.event_name == 'issues' || contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Vlastní token (ne OIDC/Claude GitHub App, kterou nemáme nainstalovanou).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"

      # Akce sama PR neotevírá - jen pushne větev claude/issue-<n>-*. Tady tedy
      # PR založíme (pokud už není) a zapneme auto-merge. PR číslo: nejdřív
      # z outputu akce, pak cross-reference v timeline, nakonec dohledáme větev
      # a otevřeme PR sami.
      - name: Open PR and enable auto-merge
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          PR="${{ steps.claude.outputs.pull_request_number }}"
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            PR=$(gh api "repos/$REPO/issues/$ISSUE/timeline" \
              --jq '[.[] | select(.event=="cross-referenced") | .source.issue | select(.pull_request!=null) | .number] | last' 2>/dev/null || true)
          fi
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            BR=$(git ls-remote --heads origin "claude/issue-$ISSUE-*" | awk '{print $2}' | sed 's#refs/heads/##' | sort | tail -1)
            if [ -n "$BR" ]; then
              TITLE=$(gh issue view "$ISSUE" --repo "$REPO" --json title --jq .title)
              echo "Opening PR for branch $BR"
              gh pr create --repo "$REPO" --base main --head "$BR" \
                --title "$TITLE" --body "Closes #$ISSUE" || true
              PR=$(gh pr list --repo "$REPO" --head "$BR" --state open --json number --jq '.[0].number' 2>/dev/null || true)
            fi
          fi
          if [ -n "$PR" ] && [ "$PR" != "null" ]; then
            echo "Enabling auto-merge for PR #$PR"
            gh pr merge "$PR" --repo "$REPO" --auto --squash --delete-branch || true
          else
            echo "No branch/PR found; nothing to merge."
          fi
